<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Downhill Drift Dash - Lambo Default</title>
<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
        user-select: none;
    }

    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
    }

    #hud {
        position: absolute;
        top: 16px;
        left: 16px;
        color: white;
        font-size: 18px;
        line-height: 1.6;
        text-shadow: 2px 2px 0 black;
        z-index: 10;
        pointer-events: none;
    }

    #message {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 44px;
        font-weight: bold;
        text-shadow: 4px 4px 0 black;
        z-index: 10;
        display: none;
        pointer-events: none;
    }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="hud">
    SCORE: <span id="score">0</span><br>
    SPEED: <span id="speed">0</span>
</div>
<div id="message">GAME OVER</div>

<script>
window.onload = function () {
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.outputEncoding = THREE.sRGBEncoding;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87cfff);
    scene.fog = new THREE.Fog(0x87cfff, 40, 240);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    const sun = new THREE.DirectionalLight(0xffffff, 1.4);
    sun.position.set(30, 70, 30);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    // Road
    const road = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 2000),
        new THREE.MeshStandardMaterial({ color: 0x2b2d32, roughness: 1 })
    );
    road.rotation.x = -Math.PI / 2;
    road.receiveShadow = true;
    scene.add(road);

    // Road lines
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    for (let i = 0; i < 120; i++) {
        const dash = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.03, 5), lineMat);
        dash.position.set(0, 0.02, -i * 16);
        scene.add(dash);
    }

    // Guardrails
    const railMat = new THREE.MeshStandardMaterial({ color: 0x9aa0aa, roughness: 0.7, metalness: 0.4 });
    for (let i = 0; i < 120; i++) {
        const z = -i * 16;
        const left = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.7, 14), railMat);
        const right = left.clone();
        left.position.set(-12, 0.35, z);
        right.position.set(12, 0.35, z);
        left.castShadow = right.castShadow = true;
        scene.add(left, right);
    }

    // Trees
    function addTree(x, z) {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.15, 0.2, 1.3, 8),
            new THREE.MeshStandardMaterial({ color: 0x6b4423 })
        );
        trunk.position.y = 0.65;
        const leaves = new THREE.Mesh(
            new THREE.ConeGeometry(0.9, 2.2, 8),
            new THREE.MeshStandardMaterial({ color: 0x2f7d32 })
        );
        leaves.position.y = 2.1;
        tree.add(trunk, leaves);
        tree.position.set(x, 0, z);
        tree.traverse(o => { if (o.isMesh) o.castShadow = true; });
        scene.add(tree);
    }

    for (let i = 0; i < 90; i++) {
        const z = -i * 18;
        addTree(-18 - Math.random() * 10, z);
        addTree(18 + Math.random() * 10, z - 8);
    }

    // Player car: Lambo-style model
    function makeWheel(x, y, z) {
        const group = new THREE.Group();
        const tire = new THREE.Mesh(
            new THREE.CylinderGeometry(0.34, 0.34, 0.24, 18),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95 })
        );
        tire.rotation.z = Math.PI / 2;
        const rim = new THREE.Mesh(
            new THREE.CylinderGeometry(0.19, 0.19, 0.25, 14),
            new THREE.MeshStandardMaterial({ color: 0xb7bcc3, roughness: 0.25, metalness: 0.9 })
        );
        rim.rotation.z = Math.PI / 2;
        group.add(tire, rim);
        group.position.set(x, y, z);
        return group;
    }

    function createLambo() {
        const car = new THREE.Group();

        const paint = new THREE.MeshStandardMaterial({
            color: 0xffd400,
            metalness: 0.75,
            roughness: 0.22
        });

        const glass = new THREE.MeshStandardMaterial({
            color: 0x111111,
            transparent: true,
            opacity: 0.72,
            roughness: 0.08,
            metalness: 0.05
        });

        const black = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const chrome = new THREE.MeshStandardMaterial({ color: 0xd6dbe0, metalness: 1, roughness: 0.2 });

        // Low wedge body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.75, 0.35, 3.15), paint);
        body.position.y = 0.45;
        car.add(body);

        // Front nose
        const nose = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.2, 1.15), paint);
        nose.position.set(0, 0.58, 1.05);
        car.add(nose);

        // Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.25), glass);
        cabin.position.set(0, 0.95, -0.05);
        car.add(cabin);

        // Roof
        const roof = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.12, 0.8), paint);
        roof.position.set(0, 1.18, -0.1);
        car.add(roof);

        // Aggressive side pods
        const podL = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.18, 2.0), paint);
        const podR = podL.clone();
        podL.position.set(-0.92, 0.42, 0);
        podR.position.set(0.92, 0.42, 0);
        car.add(podL, podR);

        // Front splitter
        const splitter = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.07, 0.25), black);
        splitter.position.set(0, 0.3, 1.56);
        car.add(splitter);

        // Rear diffuser / bumper
        const rear = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.12, 0.28), chrome);
        rear.position.set(0, 0.32, -1.56);
        car.add(rear);

        // Headlights
        const lightMat = new THREE.MeshStandardMaterial({
            color: 0xffffcc,
            emissive: 0xfff1b8,
            emissiveIntensity: 0.8
        });
        const hl1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.05), lightMat);
        const hl2 = hl1.clone();
        hl1.position.set(-0.55, 0.58, 1.58);
        hl2.position.set(0.55, 0.58, 1.58);
        car.add(hl1, hl2);

        // Tail lights
        const tailMat = new THREE.MeshStandardMaterial({
            color: 0xff3333,
            emissive: 0xff1111,
            emissiveIntensity: 0.7
        });
        const tl1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.05), tailMat);
        const tl2 = tl1.clone();
        tl1.position.set(-0.55, 0.57, -1.58);
        tl2.position.set(0.55, 0.57, -1.58);
        car.add(tl1, tl2);

        // Wheels
        const wheelPos = [
            [-0.88, 0.22, 1.05], [0.88, 0.22, 1.05],
            [-0.88, 0.22, -1.05], [0.88, 0.22, -1.05]
        ];
        const wheels = [];
        wheelPos.forEach(p => {
            const w = makeWheel(...p);
            wheels.push(w);
            car.add(w);
        });

        car.traverse(o => {
            if (o.isMesh) {
                o.castShadow = true;
                o.receiveShadow = true;
            }
        });

        return { car, wheels };
    }

    const player = createLambo();
    scene.add(player.car);

    // Game state
    let pos = new THREE.Vector3(0, 0.3, 0);
    let speed = 0;
    let velX = 0;
    let heading = 0;
    let score = 0;
    let gameOver = false;
    let grounded = true;
    let jumpVel = 0;

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Obstacles
    const hazards = [];
    const gems = [];
    const ramps = [];

    function resetWorld() {
        hazards.forEach(o => scene.remove(o));
        gems.forEach(o => scene.remove(o));
        ramps.forEach(o => scene.remove(o));
        hazards.length = 0;
        gems.length = 0;
        ramps.length = 0;

        for (let i = 0; i < 120; i++) {
            const z = -60 - i * 25;

            if (Math.random() > 0.4) {
                const h = new THREE.Mesh(
                    new THREE.BoxGeometry(5.5, 1.2, 1),
                    new THREE.MeshStandardMaterial({ color: 0xff2b1f })
                );
                h.position.set((Math.random() - 0.5) * 10, 0.6, z);
                h.castShadow = true;
                scene.add(h);
                hazards.push(h);
            }

            const gem = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.55),
                new THREE.MeshStandardMaterial({
                    color: 0x00ffff,
                    emissive: 0x007788,
                    emissiveIntensity: 0.8
                })
            );
            gem.position.set((Math.random() - 0.5) * 12, 1.4, z - 10);
            scene.add(gem);
            gems.push(gem);

            if (Math.random() > 0.65) {
                const ramp = new THREE.Mesh(
                    new THREE.BoxGeometry(4.5, 0.3, 6),
                    new THREE.MeshStandardMaterial({ color: 0xffaa22 })
                );
                ramp.rotation.x = -0.35;
                ramp.position.set((Math.random() - 0.5) * 10, 0.15, z - 6);
                ramp.castShadow = true;
                scene.add(ramp);
                ramps.push(ramp);
            }
        }
    }

    resetWorld();

    function endGame() {
        gameOver = true;
        document.getElementById('message').style.display = 'block';
    }

    function animate() {
        requestAnimationFrame(animate);

        if (!gameOver) {
            // Arcade driving
            speed = Math.min(speed + 0.012, 1.1);
            if (keys['KeyW']) speed = Math.min(speed + 0.02, 1.1);
            if (keys['KeyS']) speed = Math.max(speed - 0.04, 0);

            if (keys['KeyA']) heading += 0.05;
            if (keys['KeyD']) heading -= 0.05;

            velX = THREE.MathUtils.lerp(velX, -heading * speed * 2.8, 0.15);
            pos.x += velX;
            pos.z -= speed;

            // Jump
            if (grounded && keys['Space']) {
                jumpVel = 0.42;
                grounded = false;
            }

            if (!grounded) {
                jumpVel -= 0.022;
                pos.y += jumpVel;
                if (pos.y <= 0.3) {
                    pos.y = 0.3;
                    jumpVel = 0;
                    grounded = true;
                }
            }

            // Boundaries
            if (Math.abs(pos.x) > 9.5) {
                pos.x = Math.sign(pos.x) * 9.5;
                velX *= -0.5;
            }

            // Car animation
            player.car.position.copy(pos);
            player.car.rotation.y = heading;
            player.car.rotation.z = -heading * 0.4;
            player.car.rotation.x = grounded ? -speed * 0.03 : 0.1;

            player.wheels.forEach(w => w.rotation.x -= speed * 0.35);

            // Collisions
            hazards.forEach(h => {
                if (Math.abs(pos.x - h.position.x) < 3.8 && Math.abs(pos.z - h.position.z) < 1.2 && pos.y < 1.5) {
                    endGame();
                }
            });

            gems.forEach(g => {
                g.rotation.y += 0.04;
                if (g.visible && pos.distanceTo(g.position) < 2.2) {
                    g.visible = false;
                    score += 100;
                }
            });

            ramps.forEach(r => {
                if (Math.abs(pos.x - r.position.x) < 3 && Math.abs(pos.z - r.position.z) < 4 && grounded) {
                    jumpVel = 0.7;
                    grounded = false;
                }
            });

            score += Math.floor(speed * 2);

            // HUD
            document.getElementById('score').innerText = score;
            document.getElementById('speed').innerText = speed.toFixed(2);

            // Camera follow
            const camTarget = new THREE.Vector3(
                pos.x * 0.6 - Math.sin(heading) * 1.5,
                pos.y + 3.8,
                pos.z + 10 + speed * 4
            );
            camera.position.lerp(camTarget, 0.1);
            camera.lookAt(pos.x * 0.5, pos.y + 1, pos.z - 5);
        }

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });
};
</script>
</body>
</html>
