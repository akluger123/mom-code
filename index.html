<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downhill Drift Dash!</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px black;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="instructions">WASD to Drift/Air-Tricks | SPACE to Jump | Avoid the Barriers!</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 160);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- ROAD TEXTURE ---
        const roadCanvas = document.createElement('canvas');
        roadCanvas.width = 128;
        roadCanvas.height = 512;
        const ctx = roadCanvas.getContext('2d');
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 0, 128, 512);
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([40, 40]);
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(64, 0); ctx.lineTo(64, 512); ctx.stroke();
        
        const roadTexture = new THREE.CanvasTexture(roadCanvas);
        roadTexture.wrapS = roadTexture.wrapT = THREE.RepeatWrapping;
        roadTexture.repeat.set(1, 100);

        // --- LIGHTING ---
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 50, 20);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        // --- PLAYER (CAR) ---
        const playerPivot = new THREE.Group(); // Used for rotation independent of slope
        const carModel = new THREE.Group();
        
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 2.2), bodyMat);
        carBody.castShadow = true;
        carModel.add(carBody);

        const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.5, 1.1), new THREE.MeshPhongMaterial({ color: 0x222222 }));
        cabin.position.set(0, 0.4, -0.2);
        carModel.add(cabin);

        const wheels = [];
        const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12);
        const wheelMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        [[0.7, -0.2, 0.8], [-0.7, -0.2, 0.8], [0.7, -0.2, -0.8], [-0.7, -0.2, -0.8]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.z = Math.PI / 2;
            w.position.set(...p);
            carModel.add(w);
            wheels.push(w);
        });
        playerPivot.add(carModel);
        scene.add(playerPivot);

        // --- WORLD & PHYSICS ---
        const hillAngle = 0.15;
        let pos = new THREE.Vector3(0, 0.5, 0);
        let vel = new THREE.Vector3(0, 0, 0);
        let airRotation = { x: 0, y: 0 };
        let score = 0;
        let isGrounded = true;

        const getGroundY = (z) => -z * Math.tan(hillAngle);

        const floorGeo = new THREE.PlaneGeometry(20, 2000);
        const floorMat = new THREE.MeshPhongMaterial({ map: roadTexture });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2 - hillAngle;
        floor.position.y = getGroundY(1000);
        floor.position.z = -1000 * Math.cos(hillAngle);
        floor.receiveShadow = true;
        scene.add(floor);

        const grassGeo = new THREE.PlaneGeometry(200, 2000);
        const grassMat = new THREE.MeshPhongMaterial({ color: 0x228b22 });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.rotation.x = -Math.PI / 2 - hillAngle;
        grass.position.y = getGroundY(1000) - 0.05;
        grass.position.z = -1000 * Math.cos(hillAngle);
        scene.add(grass);

        // --- OBJECTS ---
        const hazards = [];
        const gems = [];
        function createWorld() {
            hazards.forEach(h => scene.remove(h));
            gems.forEach(g => scene.remove(g));
            hazards.length = 0; gems.length = 0;

            for (let i = 0; i < 60; i++) {
                const z = -40 - (i * 35);
                const x = (Math.random() - 0.5) * 16;
                const groundY = getGroundY(z);

                const h = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 0.5), new THREE.MeshPhongMaterial({ color: 0xff4400 }));
                h.position.set(x, groundY + 0.5 * Math.cos(hillAngle), z);
                h.rotation.x = -hillAngle;
                scene.add(h);
                hazards.push(h);

                const g = new THREE.Mesh(new THREE.OctahedronGeometry(0.6), new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x004444 }));
                const gemZ = z - 15;
                g.position.set((Math.random() - 0.5) * 14, getGroundY(gemZ) + 1.0, gemZ);
                scene.add(g);
                gems.push(g);
            }
        }
        createWorld();

        // --- INPUT ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && isGrounded) {
                vel.y = 0.45;
                isGrounded = false;
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function restart() {
            pos.set(0, 0.5, 0);
            vel.set(0, 0, 0);
            airRotation = { x: 0, y: 0 };
            carModel.rotation.set(0, 0, 0);
            score = 0;
            document.getElementById('score').innerText = score;
            createWorld();
        }

        function animate() {
            requestAnimationFrame(animate);

            // 1. Friction & Gravity
            vel.y -= 0.015;
            vel.z -= 0.01;
            
            // 2. Controls
            if (isGrounded) {
                // Ground Steering (Faster)
                if (keys['ArrowLeft'] || keys['KeyA']) vel.x -= 0.04;
                if (keys['ArrowRight'] || keys['KeyD']) vel.x += 0.04;
                
                // Reset air rotation when grounded
                carModel.rotation.x = THREE.MathUtils.lerp(carModel.rotation.x, 0, 0.1);
                carModel.rotation.y = THREE.MathUtils.lerp(carModel.rotation.y, 0, 0.1);
            } else {
                // Air Tricks
                if (keys['KeyW']) carModel.rotation.x -= 0.15; // Frontflip
                if (keys['KeyS']) carModel.rotation.x += 0.15; // Backflip
                if (keys['KeyA']) carModel.rotation.y += 0.15; // 360 Left
                if (keys['KeyD']) carModel.rotation.y -= 0.15; // 360 Right
            }
            
            vel.x *= 0.92; // Slightly higher friction for better control
            vel.z *= 0.995;
            pos.add(vel);

            // 3. Ground Collision
            const groundY = getGroundY(pos.z) + 0.3;
            if (pos.y < groundY) {
                pos.y = groundY;
                vel.y = -vel.z * Math.tan(hillAngle);
                isGrounded = true;
            } else {
                isGrounded = false;
            }

            // 4. Update Visuals
            playerPivot.position.copy(pos);
            playerPivot.rotation.x = -hillAngle; // Pivot follows hill slope
            
            // Visual Lean (only if not doing massive air tricks)
            if (isGrounded) {
                playerPivot.rotation.y = -vel.x * 0.8;
                playerPivot.rotation.z = -vel.x * 1.5;
            } else {
                playerPivot.rotation.z = THREE.MathUtils.lerp(playerPivot.rotation.z, 0, 0.1);
            }
            
            wheels.forEach(w => w.rotation.x += vel.z * 3);

            // Camera follow
            camera.position.lerp(new THREE.Vector3(pos.x * 0.5, pos.y + 4.5, pos.z + 12), 0.1);
            camera.lookAt(pos.x, pos.y, pos.z - 10);

            // Collisions
            hazards.forEach(h => {
                const dx = Math.abs(pos.x - h.position.x);
                const dz = Math.abs(pos.z - h.position.z);
                const dy = Math.abs(pos.y - h.position.y);
                if (dx < 2.2 && dz < 0.8 && dy < 1) restart();
            });

            gems.forEach((g, i) => {
                g.rotation.y += 0.05;
                if (pos.distanceTo(g.position) < 2) {
                    scene.remove(g);
                    gems.splice(i, 1);
                    score += 100;
                    document.getElementById('score').innerText = score;
                }
            });

            if (pos.z < -2000) restart();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
