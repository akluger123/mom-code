<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downhill Car Dash!</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px black;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="instructions">WASD/Arrows to Steer | SPACE to Jump | Avoid the Hazard Blocks!</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 50, 10);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // --- PLAYER (CAR MODEL) ---
        const playerGroup = new THREE.Group();
        
        // Car Body
        const bodyGeo = new THREE.BoxGeometry(1, 0.5, 2);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const carBody = new THREE.Mesh(bodyGeo, bodyMat);
        carBody.castShadow = true;
        playerGroup.add(carBody);

        // Cabin
        const cabinGeo = new THREE.BoxGeometry(0.8, 0.4, 1);
        const cabinMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const cabin = new THREE.Mesh(cabinGeo, cabinMat);
        cabin.position.y = 0.45;
        cabin.position.z = -0.2;
        playerGroup.add(cabin);

        // Wheels
        const wheels = [];
        const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 12);
        const wheelMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const wheelPos = [[0.6, -0.2, 0.7], [-0.6, -0.2, 0.7], [0.6, -0.2, -0.7], [-0.6, -0.2, -0.7]];
        wheelPos.forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.z = Math.PI / 2;
            w.position.set(p[0], p[1], p[2]);
            playerGroup.add(w);
            wheels.push(w);
        });

        scene.add(playerGroup);

        // --- PHYSICS VARIABLES ---
        const hillAngle = 0.18; // Slightly steeper
        let pos = new THREE.Vector3(0, 0, 0);
        let vel = new THREE.Vector3(0, 0, 0);
        const gravity = -0.012;
        const jumpStrength = 0.25;
        let isGrounded = false;
        let score = 0;

        // Function to get ground Y at a specific Z
        function getGroundHeight(z) {
            return -z * Math.tan(hillAngle);
        }

        // Initialize position correctly on the slope
        pos.y = getGroundHeight(0) + 0.5;

        // --- WORLD ---
        const floorGeo = new THREE.PlaneGeometry(30, 2000);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x33aa33 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        // Pivot from the top so it rotates downward into the distance
        floor.rotation.x = -Math.PI / 2 - hillAngle;
        floor.position.z = -1000 * Math.cos(hillAngle);
        floor.position.y = getGroundHeight(1000);
        floor.receiveShadow = true;
        scene.add(floor);

        // --- HAZARDS & GEMS ---
        const hazards = [];
        const gems = [];
        
        function spawnHazards() {
            for(let i=0; i<60; i++) {
                const zPos = -i * 20 - 20;
                
                // Roadblocks
                const hGeo = new THREE.BoxGeometry(3, 1, 0.5);
                const hMat = new THREE.MeshPhongMaterial({ color: 0xffaa00 });
                const h = new THREE.Mesh(hGeo, hMat);
                h.position.set((Math.random() - 0.5) * 15, getGroundHeight(zPos) + 0.5, zPos);
                h.rotation.x = -hillAngle;
                h.castShadow = true;
                scene.add(h);
                hazards.push(h);

                // Gems
                const gGeo = new THREE.OctahedronGeometry(0.5);
                const gMat = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0x555500 });
                const g = new THREE.Mesh(gGeo, gMat);
                const gz = zPos - 10;
                g.position.set((Math.random() - 0.5) * 15, getGroundHeight(gz) + 1.2, gz);
                scene.add(g);
                gems.push(g);
            }
        }
        spawnHazards();

        // --- INPUT ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'Space' && isGrounded) {
                vel.y = jumpStrength;
                isGrounded = false;
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function restart() {
            pos.set(0, 0.5, 0);
            vel.set(0, 0, 0);
            score = 0;
            document.getElementById('score').innerText = score;
        }

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Gravity & Hill Physics
            vel.y += gravity;
            
            // Artificial "gravity" pulling the car down the slope
            vel.z -= 0.006; 
            
            // 2. Controls
            if (keys['ArrowLeft'] || keys['KeyA']) vel.x -= 0.015;
            if (keys['ArrowRight'] || keys['KeyD']) vel.x += 0.015;
            
            // Friction
            vel.x *= 0.92;
            vel.z *= 0.99;
            
            pos.add(vel);

            // 3. Stick to Hill Surface
            const groundY = getGroundHeight(pos.z);
            if (pos.y < groundY + 0.5) {
                pos.y = groundY + 0.5;
                // If moving along ground, adjust Y velocity to match slope to stop "jitter"
                // This makes it look like it's actually rolling down
                vel.y = -vel.z * Math.tan(hillAngle); 
                isGrounded = true;
            } else {
                isGrounded = false;
            }

            // 4. Update Car Object
            playerGroup.position.copy(pos);
            playerGroup.rotation.x = -hillAngle; 
            playerGroup.rotation.y = -vel.x * 2;
            playerGroup.rotation.z = -vel.x * 1.5;

            // Spin wheels based on speed
            wheels.forEach(w => w.rotation.x += vel.z * 2);

            // 5. Camera follow
            camera.position.set(pos.x, pos.y + 4, pos.z + 8);
            camera.lookAt(pos.x, pos.y, pos.z - 5);

            // 6. Hazard Collision
            hazards.forEach(h => {
                if (playerGroup.position.distanceTo(h.position) < 1.8) {
                    restart();
                }
            });

            // 7. Gem Collection
            gems.forEach((g, idx) => {
                g.rotation.y += 0.05;
                if (playerGroup.position.distanceTo(g.position) < 1.5) {
                    scene.remove(g);
                    gems.splice(idx, 1);
                    score += 100;
                    document.getElementById('score').innerText = score;
                }
            });

            // 8. Infinite Loop logic
            if (pos.z < -1000) {
                pos.z = 0;
                pos.y = getGroundHeight(0) + 0.5;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
