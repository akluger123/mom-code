<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downhill Drift Dash!</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px black;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="instructions">WASD to Move/Air-Tricks | SPACE to Jump | Yellow Ramps Fly!</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 160);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- CONSTANTS ---
        const hillAngle = 0.12;
        const getGroundY = (z) => -z * Math.tan(hillAngle);

        // --- ROAD ---
        const roadCanvas = document.createElement('canvas');
        roadCanvas.width = 128; roadCanvas.height = 512;
        const ctx = roadCanvas.getContext('2d');
        ctx.fillStyle = '#333'; ctx.fillRect(0, 0, 128, 512);
        ctx.strokeStyle = '#fff'; ctx.setLineDash([40, 40]); ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(64, 0); ctx.lineTo(64, 512); ctx.stroke();
        
        const roadTexture = new THREE.CanvasTexture(roadCanvas);
        roadTexture.wrapS = roadTexture.wrapT = THREE.RepeatWrapping;
        roadTexture.repeat.set(1, 100);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 4000), new THREE.MeshPhongMaterial({ map: roadTexture }));
        floor.rotation.x = -Math.PI / 2 - hillAngle;
        floor.position.set(0, getGroundY(1000), -1000 * Math.cos(hillAngle));
        floor.receiveShadow = true;
        scene.add(floor);

        const grass = new THREE.Mesh(new THREE.PlaneGeometry(200, 4000), new THREE.MeshPhongMaterial({ color: 0x228b22 }));
        grass.rotation.x = -Math.PI / 2 - hillAngle;
        grass.position.set(0, getGroundY(1000) - 0.1, -1000 * Math.cos(hillAngle));
        scene.add(grass);

        // --- LIGHTING ---
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 50, 20);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        // --- PLAYER ---
        const playerPivot = new THREE.Group();
        const carModel = new THREE.Group();
        
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 2.2), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
        carBody.castShadow = true;
        carModel.add(carBody);

        const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.5, 1.1), new THREE.MeshPhongMaterial({ color: 0x222222 }));
        cabin.position.set(0, 0.4, -0.2);
        carModel.add(cabin);

        const wheels = [];
        [[0.7, -0.2, 0.8], [-0.7, -0.2, 0.8], [0.7, -0.2, -0.8], [-0.7, -0.2, -0.8]].forEach(p => {
            const w = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            w.rotation.z = Math.PI / 2;
            w.position.set(...p);
            carModel.add(w);
            wheels.push(w);
        });
        playerPivot.add(carModel);
        scene.add(playerPivot);

        // --- GAME STATE ---
        let pos = new THREE.Vector3(0, 0.5, 0);
        let vel = new THREE.Vector3(0, 0, 0);
        let isGrounded = true;
        let score = 0;
        const hazards = [];
        const gems = [];
        const ramps = [];

        function createWorld() {
            [hazards, gems, ramps].forEach(arr => {
                arr.forEach(obj => scene.remove(obj));
                arr.length = 0;
            });

            for (let i = 0; i < 80; i++) {
                const z = -40 - (i * 30);
                const groundY = getGroundY(z);

                // Hazards (Barriers)
                if (Math.random() > 0.4) {
                    const h = new THREE.Mesh(new THREE.BoxGeometry(5, 1, 0.5), new THREE.MeshPhongMaterial({ color: 0xff4400 }));
                    h.position.set((Math.random() - 0.5) * 15, groundY + 0.5, z);
                    h.rotation.x = -hillAngle;
                    scene.add(h);
                    hazards.push(h);
                }

                // Ramps
                if (Math.random() > 0.7) {
                    const r = new THREE.Mesh(new THREE.BoxGeometry(4, 0.5, 3), new THREE.MeshPhongMaterial({ color: 0xffcc00 }));
                    r.position.set((Math.random() - 0.5) * 12, groundY + 0.1, z - 10);
                    r.rotation.x = -hillAngle - 0.4; // Tilted up relative to slope
                    scene.add(r);
                    ramps.push(r);
                }

                // Gems
                const g = new THREE.Mesh(new THREE.OctahedronGeometry(0.6), new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x004444 }));
                g.position.set((Math.random() - 0.5) * 14, groundY + 1.2, z - 15);
                scene.add(g);
                gems.push(g);
            }
        }
        createWorld();

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && isGrounded) {
                vel.y = 0.5;
                isGrounded = false;
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function restart() {
            pos.set(0, 0.5, 0);
            vel.set(0, 0, 0);
            carModel.rotation.set(0, 0, 0);
            score = 0;
            document.getElementById('score').innerText = score;
            createWorld();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Gravity & Slope Push
            vel.y -= 0.015;
            vel.z -= 0.005;

            if (isGrounded) {
                // Ground Control
                if (keys['KeyA'] || keys['ArrowLeft']) vel.x -= 0.03;
                if (keys['KeyD'] || keys['ArrowRight']) vel.x += 0.03;
                
                // Align to ground visuals
                carModel.rotation.x = THREE.MathUtils.lerp(carModel.rotation.x, 0, 0.1);
                carModel.rotation.y = THREE.MathUtils.lerp(carModel.rotation.y, 0, 0.1);
                carModel.rotation.z = THREE.MathUtils.lerp(carModel.rotation.z, -vel.x * 0.5, 0.1);
            } else {
                // Air Tricks
                if (keys['KeyW']) carModel.rotation.x -= 0.15; // Frontflip
                if (keys['KeyS']) carModel.rotation.x += 0.15; // Backflip
                if (keys['KeyA']) carModel.rotation.y += 0.12; // Flat spin
                if (keys['KeyD']) carModel.rotation.y -= 0.12;
            }

            vel.x *= 0.95;
            vel.z *= 0.99;
            pos.add(vel);

            // Slope Collision
            const groundLimit = getGroundY(pos.z) + 0.4;
            if (pos.y < groundLimit) {
                pos.y = groundLimit;
                if (vel.y < 0) vel.y = -vel.z * Math.tan(hillAngle); // Maintain slope velocity
                isGrounded = true;
            } else {
                isGrounded = false;
            }

            playerPivot.position.copy(pos);
            playerPivot.rotation.x = -hillAngle;
            wheels.forEach(w => w.rotation.x += vel.z * 2);

            // Camera
            camera.position.lerp(new THREE.Vector3(pos.x * 0.5, pos.y + 4, pos.z + 10), 0.1);
            camera.lookAt(pos.x, pos.y, pos.z - 5);

            // Collisions
            hazards.forEach(h => {
                if (pos.distanceTo(h.position) < 1.8) restart();
            });

            ramps.forEach(r => {
                const dx = Math.abs(pos.x - r.position.x);
                const dz = Math.abs(pos.z - r.position.z);
                if (dx < 2.5 && dz < 1.5 && isGrounded) {
                    vel.y = 0.6; // Launch!
                    isGrounded = false;
                }
            });

            gems.forEach((g, i) => {
                g.rotation.y += 0.05;
                if (pos.distanceTo(g.position) < 2) {
                    scene.remove(g);
                    gems.splice(i, 1);
                    score += 100;
                    document.getElementById('score').innerText = score;
                }
            });

            if (pos.z < -2500) restart();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
