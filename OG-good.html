<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustang Downhill Drift</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 32px; font-weight: bold;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
        #instructions {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: white; font-size: 18px;
            text-shadow: 2px 2px 4px black; pointer-events: none;
        }
        #gameover, #pauseMenu {
            display: none; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 52px; font-weight: bold;
            text-align: center; text-shadow: 3px 3px #000;
            background: rgba(0,0,0,0.6); padding: 40px; border-radius: 20px;
        }
        #gameover span, #pauseMenu span { display: block; font-size: 22px; margin-top: 10px; }
    </style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>
<div id="instructions">
    W/S = Speed Up / Brake &nbsp;|&nbsp; A/D = Steer &nbsp;|&nbsp; SPACE = Jump<br>
    P = Pause &nbsp;|&nbsp; R = Restart &nbsp;|&nbsp; In Air: 360 Spin!
</div>

<div id="gameover">CRASHED!<span>Press R to Restart</span></div>
<div id="pauseMenu">PAUSED<span>Press P to Resume</span></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog        = new THREE.Fog(0x87ceeb, 60, 250);

const camera   = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(40, 100, 60);
sun.castShadow = true;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const ROAD_LENGTH = 5000;
const ROAD_WIDTH = 22;

// Road Texture
const roadCanvas = document.createElement('canvas');
roadCanvas.width = 256; roadCanvas.height = 1024;
const rc = roadCanvas.getContext('2d');
rc.fillStyle = '#333333'; rc.fillRect(0, 0, 256, 1024);
rc.strokeStyle = '#ffffff'; rc.setLineDash([80, 80]); rc.lineWidth = 6;
rc.beginPath(); rc.moveTo(128, 0); rc.lineTo(128, 1024); rc.stroke();
rc.strokeStyle = '#ffff00'; rc.setLineDash([]); rc.lineWidth = 5;
rc.beginPath(); rc.moveTo(8,0);   rc.lineTo(8,1024);   rc.stroke();
rc.beginPath(); rc.moveTo(248,0); rc.lineTo(248,1024); rc.stroke();

const roadTex = new THREE.CanvasTexture(roadCanvas);
roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
roadTex.repeat.set(1, ROAD_LENGTH / 20);

const road = new THREE.Mesh(
    new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_LENGTH),
    new THREE.MeshPhongMaterial({ map: roadTex })
);
road.rotation.x = -Math.PI / 2;
road.position.set(0, 0, -ROAD_LENGTH / 2);
road.receiveShadow = true;
scene.add(road);

// Grass and Trees
const grass = new THREE.Mesh(
    new THREE.PlaneGeometry(600, ROAD_LENGTH),
    new THREE.MeshPhongMaterial({ color: 0x2d8a2d })
);
grass.rotation.x = -Math.PI / 2;
grass.position.set(0, -0.01, -ROAD_LENGTH / 2);
scene.add(grass);

for (let i = 0; i < 150; i++) {
    const z = -(Math.random() * ROAD_LENGTH);
    const side = Math.random() > 0.5 ? 1 : -1;
    const x = side * (20 + Math.random() * 30);
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3), new THREE.MeshPhongMaterial({ color: 0x5c3a1e }));
    const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5, 5, 8), new THREE.MeshPhongMaterial({ color: 0x1a5b1a }));
    leaves.position.y = 3.5;
    tree.add(trunk, leaves);
    tree.position.set(x, 1.5, z);
    scene.add(tree);
}

// Mustang Detailed Model
const carGroup = new THREE.Group();
const carMat = new THREE.MeshPhongMaterial({ color: 0xcc0000, shininess: 80 }); 
const glassMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 100 });

// Body Base (Main hood and rear)
const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 2.8), carMat);
carBody.position.y = 0.35;
carGroup.add(carBody);

// Cabin (Tapered roof)
const carCabin = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.45, 1.2), glassMat);
carCabin.position.set(0, 0.8, -0.2);
carGroup.add(carCabin);

// Long Hood Detail
const hoodLine = new THREE.Mesh(new THREE.BoxGeometry(1.41, 0.1, 1.4), carMat);
hoodLine.position.set(0, 0.6, 0.7);
carGroup.add(hoodLine);

// Spoiler
const spoilerBase = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.1, 0.2), carMat);
spoilerBase.position.set(0, 0.7, -1.3);
carGroup.add(spoilerBase);

// Wheels
const wheelGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.3, 16);
const wheelMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
const wheelPositions = [
    [0.72, 0.3, 0.9], [-0.72, 0.3, 0.9], 
    [0.72, 0.3, -0.9], [-0.72, 0.3, -0.9]
];
wheelPositions.forEach(p => {
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.rotation.z = Math.PI / 2;
    w.position.set(...p);
    carGroup.add(w);
});
scene.add(carGroup);

let pos = new THREE.Vector3(0, 0, 0);
let speed = 0, velX = 0, velY = 0, heading = 0, isGrounded = true;
let airYaw = 0, airYawVel = 0, score = 0, isDead = false, isPaused = false;

const hazards = [], gems = [], ramps = [];
const scoreEl = document.getElementById('score'), gameoverEl = document.getElementById('gameover'), pauseEl = document.getElementById('pauseMenu');

// Traffic Cone / Road Block Material
const barrierCanvas = document.createElement('canvas');
barrierCanvas.width = 64; barrierCanvas.height = 64;
const bc = barrierCanvas.getContext('2d');
bc.fillStyle = '#ff6600'; bc.fillRect(0,0,64,64);
bc.fillStyle = '#ffffff'; bc.fillRect(0, 20, 64, 24);
const barrierTex = new THREE.CanvasTexture(barrierCanvas);

function createWorld() {
    [...hazards, ...gems, ...ramps].forEach(o => scene.remove(o));
    hazards.length = gems.length = ramps.length = 0;
    
    for (let i = 0; i < 110; i++) {
        const z = -80 - i * 45;
        // Orange Road Block Barriers
        if (Math.random() > 0.3) {
            const lane = (Math.random() > 0.5 ? 1 : -1) * 6;
            const geo = new THREE.BoxGeometry(10, 1.5, 1);
            const mat = new THREE.MeshPhongMaterial({ map: barrierTex });
            const barrier = new THREE.Mesh(geo, mat);
            barrier.position.set(lane > 0 ? 8 : -8, 0.75, z);
            scene.add(barrier); hazards.push(barrier);
        }
        // Properly Oriented Ramps (Slope facing the car)
        if (Math.random() > 0.65) {
            const r = new THREE.Mesh(
                new THREE.BoxGeometry(5, 0.6, 8), 
                new THREE.MeshPhongMaterial({ color: 0xffcc00 })
            );
            r.position.set((Math.random() - 0.5) * 12, 0.1, z - 10);
            r.rotation.x = 0.2; // Slanted towards the player
            scene.add(r); ramps.push(r);
        }
        // Gems
        const g = new THREE.Mesh(new THREE.OctahedronGeometry(0.6), new THREE.MeshPhongMaterial({ color: 0x00eeff }));
        g.position.set((Math.random() - 0.5) * 15, 1.2, z - 20);
        scene.add(g); gems.push(g);
    }
}
createWorld();

const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space' && isGrounded && !isDead && !isPaused) { 
        velY = 0.45; isGrounded = false; airYaw = 0; airYawVel = 0;
    }
    if (e.code === 'KeyR') restart();
    if (e.code === 'KeyP' && !isDead) {
        isPaused = !isPaused;
        pauseEl.style.display = isPaused ? 'block' : 'none';
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function restart() {
    pos.set(0, 0, 0); speed = velX = velY = heading = airYaw = airYawVel = 0;
    isGrounded = true; isDead = false; isPaused = false;
    score = 0; scoreEl.innerText = 0;
    gameoverEl.style.display = pauseEl.style.display = 'none';
    createWorld();
}

function animate() {
    requestAnimationFrame(animate);
    if (isDead || isPaused) { renderer.render(scene, camera); return; }

    if (isGrounded) {
        speed = Math.min(speed + 0.005, 1.1);
        if (keys['KeyW']) speed += 0.01;
        if (keys['KeyS']) speed -= 0.03;
        if (keys['KeyA']) heading += 0.05;
        if (keys['KeyD']) heading -= 0.05;
        
        heading *= 0.9;
        velX = THREE.MathUtils.lerp(velX, -heading * speed * 2.5, 0.15);
        speed *= 0.992;
    } else {
        velY -= 0.02; // gravity
        pos.y += velY;
        if (keys['KeyA']) airYawVel += 0.01;
        if (keys['KeyD']) airYawVel -= 0.01;
        airYaw += airYawVel;
        
        if (pos.y <= 0) {
            pos.y = 0; velY = 0; isGrounded = true;
            const flips = Math.round(Math.abs(airYaw) / (Math.PI * 2));
            if (flips > 0) { score += flips * 500; scoreEl.innerText = score; }
            airYaw = 0;
        }
    }

    pos.z -= speed;
    pos.x += velX;

    const limit = ROAD_WIDTH / 2 - 1;
    if (pos.x > limit) { pos.x = limit; velX *= -0.5; }
    if (pos.x < -limit) { pos.x = -limit; velX *= -0.5; }

    carGroup.position.copy(pos);
    carGroup.rotation.set(0, heading, isGrounded ? (velX * -0.2) : airYaw);

    // Collisions
    hazards.forEach(h => {
        if (Math.abs(pos.z - h.position.z) < 1.0 && Math.abs(pos.x - h.position.x) < 5.2 && pos.y < 1.5) isDead = true;
    });

    ramps.forEach(r => {
        if (Math.abs(pos.z - r.position.z) < 3.5 && Math.abs(pos.x - r.position.x) < 2.5 && isGrounded) {
            velY = speed * 0.7 + 0.25;
            isGrounded = false;
        }
    });

    gems.forEach(g => {
        if (g.visible && pos.distanceTo(g.position) < 2) {
            g.visible = false; score += 100; scoreEl.innerText = score;
        }
    });

    if (isDead) gameoverEl.style.display = 'block';

    camera.position.lerp(new THREE.Vector3(pos.x, pos.y + 5, pos.z + 12), 0.15);
    camera.lookAt(pos.x, pos.y + 1, pos.z - 5);
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
