<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downhill Drift Dash!</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", sans-serif;
      background: #000;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 2px 2px #000;
      pointer-events: none;
      z-index: 10;
    }

    #instructions {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 18px;
      text-shadow: 2px 2px 4px black;
      pointer-events: none;
      z-index: 10;
    }

    #gameover, #pauseMenu {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 52px;
      font-weight: bold;
      text-align: center;
      text-shadow: 3px 3px #000;
      background: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 20px;
      z-index: 20;
    }

    #gameover span, #pauseMenu span {
      display: block;
      font-size: 22px;
      margin-top: 10px;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="ui">Score: <span id="score">0</span></div>
  <div id="instructions">
    W/S = Faster / Brake &nbsp;|&nbsp; A/D = Steer &nbsp;|&nbsp; SPACE = Jump<br>
    P = Pause &nbsp;|&nbsp; R = Restart &nbsp;|&nbsp; In Air: Spin/Flip
  </div>

  <div id="gameover">CRASHED!<span>Press R to Restart</span></div>
  <div id="pauseMenu">PAUSED<span>Press P to Resume</span></div>

  <!-- Three.js loaded globally so this is more double-click friendly -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <script>
    // Make sure THREE loaded
    if (!window.THREE) {
      alert("Three.js failed to load. Check your internet connection or browser restrictions.");
      throw new Error("Three.js not loaded");
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 60, 220);

    const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 1000);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    });

    const sun = new THREE.DirectionalLight(0xffffff, 1.4);
    sun.position.set(40, 100, 60);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));

    const ROAD_LENGTH = 5000;
    const ROAD_WIDTH = 22;

    // Road texture
    const roadCanvas = document.createElement("canvas");
    roadCanvas.width = 256;
    roadCanvas.height = 1024;
    const rc = roadCanvas.getContext("2d");

    rc.fillStyle = "#3a3a3a";
    rc.fillRect(0, 0, 256, 1024);

    rc.strokeStyle = "#ffffff";
    rc.setLineDash([80, 80]);
    rc.lineWidth = 6;
    rc.beginPath();
    rc.moveTo(128, 0);
    rc.lineTo(128, 1024);
    rc.stroke();

    rc.strokeStyle = "#ffff00";
    rc.setLineDash([]);
    rc.lineWidth = 5;
    rc.beginPath();
    rc.moveTo(8, 0);
    rc.lineTo(8, 1024);
    rc.stroke();
    rc.beginPath();
    rc.moveTo(248, 0);
    rc.lineTo(248, 1024);
    rc.stroke();

    const roadTex = new THREE.CanvasTexture(roadCanvas);
    roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
    roadTex.repeat.set(1, ROAD_LENGTH / 20);

    const road = new THREE.Mesh(
      new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_LENGTH),
      new THREE.MeshPhongMaterial({ map: roadTex })
    );
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0, -ROAD_LENGTH / 2);
    road.receiveShadow = true;
    scene.add(road);

    // Grass
    const grass = new THREE.Mesh(
      new THREE.PlaneGeometry(600, ROAD_LENGTH),
      new THREE.MeshPhongMaterial({ color: 0x2d8a2d })
    );
    grass.rotation.x = -Math.PI / 2;
    grass.position.set(0, -0.01, -ROAD_LENGTH / 2);
    scene.add(grass);

    // Walls
    const wallGeo = new THREE.BoxGeometry(1, 10, ROAD_LENGTH);
    const wallMat = new THREE.MeshPhongMaterial({ color: 0x555555 });

    const leftWall = new THREE.Mesh(wallGeo, wallMat);
    leftWall.position.set(-ROAD_WIDTH / 2 - 0.5, 2, -ROAD_LENGTH / 2);
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(wallGeo, wallMat);
    rightWall.position.set( ROAD_WIDTH / 2 + 0.5, 2, -ROAD_LENGTH / 2);
    scene.add(rightWall);

    // Trees
    for (let i = 0; i < 200; i++) {
      const z = -(Math.random() * ROAD_LENGTH);
      const side = Math.random() > 0.5 ? 1 : -1;
      const x = side * (20 + Math.random() * 30);

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.4, 3, 6),
        new THREE.MeshPhongMaterial({ color: 0x5c3a1e })
      );
      trunk.position.set(x, 1.5, z);
      scene.add(trunk);

      const top = new THREE.Mesh(
        new THREE.ConeGeometry(2.2, 4, 7),
        new THREE.MeshPhongMaterial({ color: 0x1a6b1a })
      );
      top.position.set(x, 5, z);
      scene.add(top);
    }

    // Car
    const carGroup = new THREE.Group();

    const body = new THREE.Mesh(
      new THREE.BoxGeometry(1.3, 0.45, 2.4),
      new THREE.MeshPhongMaterial({ color: 0xff2020 })
    );
    body.castShadow = true;
    carGroup.add(body);

    const cabin = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.42, 1.15),
      new THREE.MeshPhongMaterial({ color: 0x222244 })
    );
    cabin.position.set(0, 0.43, -0.2);
    carGroup.add(cabin);

    const wheels = [];
    [
      [0.72, -0.18,  0.78],
      [-0.72, -0.18, 0.78],
      [0.72, -0.18, -0.78],
      [-0.72, -0.18, -0.78]
    ].forEach(p => {
      const w = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 0.3, 14),
        new THREE.MeshPhongMaterial({ color: 0x111111 })
      );
      w.rotation.z = Math.PI / 2;
      w.position.set(p[0], p[1], p[2]);
      carGroup.add(w);
      wheels.push(w);
    });

    scene.add(carGroup);

    // Game state
    const pos = new THREE.Vector3(0, 0.3, 0);
    let speed = 0;
    let velX = 0;
    let velY = 0;
    let heading = 0;
    let isGrounded = true;
    let airYawVel = 0;
    let airPitchVel = 0;
    let airYaw = 0;
    let airPitch = 0;
    let score = 0;
    let isDead = false;
    let isPaused = false;

    const hazards = [];
    const gems = [];
    const ramps = [];

    const scoreEl = document.getElementById("score");
    const gameoverEl = document.getElementById("gameover");
    const pauseEl = document.getElementById("pauseMenu");

    function createWorld() {
      [...hazards, ...gems, ...ramps].forEach(o => scene.remove(o));
      hazards.length = 0;
      gems.length = 0;
      ramps.length = 0;

      for (let i = 0; i < 110; i++) {
        const z = -60 - i * 42;

        if (Math.random() > 0.3) {
          const gapX = (Math.random() - 0.5) * 10;
          const geo = new THREE.BoxGeometry(8, 1.4, 0.8);
          const mat = new THREE.MeshPhongMaterial({ color: 0xff3300 });

          const h1 = new THREE.Mesh(geo, mat);
          h1.position.set(gapX - 7.5, 0.7, z);

          const h2 = new THREE.Mesh(geo, mat);
          h2.position.set(gapX + 7.5, 0.7, z);

          scene.add(h1, h2);
          hazards.push(h1, h2);
        }

        if (Math.random() > 0.6) {
          const r = new THREE.Mesh(
            new THREE.BoxGeometry(4.5, 0.5, 6),
            new THREE.MeshPhongMaterial({ color: 0xffcc00 })
          );
          r.position.set((Math.random() - 0.5) * 13, 0.2, z - 4);
          r.rotation.x = -0.32;
          scene.add(r);
          ramps.push(r);
        }

        const g = new THREE.Mesh(
          new THREE.OctahedronGeometry(0.6),
          new THREE.MeshPhongMaterial({ color: 0x00eeff })
        );
        g.position.set((Math.random() - 0.5) * 15, 1.2, z - 20);
        scene.add(g);
        gems.push(g);
      }
    }

    createWorld();

    const keys = {};

    function restart() {
      pos.set(0, 0.3, 0);
      speed = 0;
      velX = 0;
      velY = 0;
      heading = 0;
      airYaw = 0;
      airPitch = 0;
      airYawVel = 0;
      airPitchVel = 0;
      isGrounded = true;
      isDead = false;
      isPaused = false;
      score = 0;
      scoreEl.innerText = "0";
      gameoverEl.style.display = "none";
      pauseEl.style.display = "none";
      createWorld();
    }

    window.addEventListener("keydown", e => {
      keys[e.code] = true;

      if (e.code === "Space" && isGrounded && !isDead && !isPaused) {
        velY = 0.45;
        isGrounded = false;
        airYaw = 0;
        airPitch = 0;
        airYawVel = 0;
        airPitchVel = 0;
      }

      if (e.code === "KeyR") {
        restart();
      }

      if (e.code === "KeyP" && !isDead) {
        isPaused = !isPaused;
        pauseEl.style.display = isPaused ? "block" : "none";
      }
    });

    window.addEventListener("keyup", e => {
      keys[e.code] = false;
    });

    function animate() {
      requestAnimationFrame(animate);

      if (isDead || isPaused) {
        renderer.render(scene, camera);
        return;
      }

      const GRAVITY = 0.02;
      const TURN_SPEED = 0.05;
      const MAX_SPEED = 1.0;

      if (isGrounded) {
        speed = Math.min(speed + 0.01, MAX_SPEED);

        if (keys["KeyW"]) speed += 0.01;
        if (keys["KeyS"]) speed -= 0.02;

        if (keys["KeyA"]) heading += TURN_SPEED;
        if (keys["KeyD"]) heading -= TURN_SPEED;

        heading *= 0.92;
        velX = THREE.MathUtils.lerp(velX, -heading * speed * 2.5, 0.15);
        speed *= 0.99;
      } else {
        velY -= GRAVITY;
        pos.y += velY;

        if (keys["KeyA"]) airYawVel += 0.01;
        if (keys["KeyD"]) airYawVel -= 0.01;

        airYaw += airYawVel;
        airPitch += airPitchVel;

        if (pos.y <= 0.3) {
          pos.y = 0.3;
          velY = 0;
          isGrounded = true;

          const landingFlips = Math.round(Math.abs(airYaw) / (Math.PI * 2));
          if (landingFlips > 0) {
            score += landingFlips * 500;
            scoreEl.innerText = score;
          }
        }
      }

      pos.z -= speed;
      pos.x += velX;

      const limit = ROAD_WIDTH / 2 - 0.8;
      if (pos.x > limit) {
        pos.x = limit;
        velX *= -0.5;
      }
      if (pos.x < -limit) {
        pos.x = -limit;
        velX *= -0.5;
      }

      carGroup.position.copy(pos);
      carGroup.rotation.set(
        isGrounded ? 0 : airPitch,
        heading,
        isGrounded ? (velX * -0.2) : airYaw
      );

      // Hazards
      for (let i = 0; i < hazards.length; i++) {
        const h = hazards[i];
        const dx = Math.abs(pos.x - h.position.x);
        const dz = Math.abs(pos.z - h.position.z);
        if (dx < 4.5 && dz < 1.0 && pos.y < 1.8) {
          isDead = true;
          gameoverEl.style.display = "block";
          break;
        }
      }

      // Gems
      for (let i = 0; i < gems.length; i++) {
        const g = gems[i];
        if (g.visible && pos.distanceTo(g.position) < 2) {
          g.visible = false;
          score += 100;
          scoreEl.innerText = score;
        }
      }

      // Ramps
      for (let i = 0; i < ramps.length; i++) {
        const r = ramps[i];
        const dx = Math.abs(pos.x - r.position.x);
        const dz = Math.abs(pos.z - r.position.z);
        if (dx < 2.5 && dz < 3 && isGrounded) {
          velY = speed * 0.8 + 0.2;
          isGrounded = false;
        }
      }

      camera.position.lerp(
        new THREE.Vector3(pos.x, pos.y + 5, pos.z + 12),
        0.1
      );
      camera.lookAt(pos.x, pos.y, pos.z - 5);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
